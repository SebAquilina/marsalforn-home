name: restore-secrets

on:
  workflow_dispatch:
    inputs:
      gemini_key:
        description: "GEMINI_API_KEY value (paste once, never echoed)"
        required: true
      resend_key:
        description: "RESEND_API_KEY value (optional)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Restore individual env vars (no blob-merge)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI: ${{ inputs.gemini_key }}
          RESEND: ${{ inputs.resend_key }}
        run: |
          set -euo pipefail
          PROJ=studio-vella-web
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PROJ}"

          # Fetch current
          curl -fsS -H "Authorization: Bearer ${CF_TOKEN}" "${API}" -o /tmp/proj.json

          jq --arg gem "$GEMINI" --arg res "$RESEND" '
            .result.deployment_configs as $cfg |
            {
              deployment_configs: (
                $cfg
                | .production.env_vars.GEMINI_API_KEY = {"type":"secret_text","value":$gem}
                | (if $res != "" then .production.env_vars.RESEND_API_KEY = {"type":"secret_text","value":$res} else . end)
                | .preview.env_vars.GEMINI_API_KEY = {"type":"secret_text","value":$gem}
                | (if $res != "" then .preview.env_vars.RESEND_API_KEY = {"type":"secret_text","value":$res} else . end)
              )
            }
          ' /tmp/proj.json > /tmp/patch.json

          curl -fsS -X PATCH -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            "${API}" --data @/tmp/patch.json -o /tmp/resp.json
          echo "PATCH success: $(jq '.success' /tmp/resp.json)"
