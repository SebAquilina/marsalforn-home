name: restore-all-secrets

on:
  workflow_dispatch:
    inputs:
      gemini_key:
        description: GEMINI_API_KEY
        required: true
      admin_user:
        description: ADMIN_USER
        required: true
        default: seb
      admin_password:
        description: ADMIN_PASSWORD
        required: true
      resend_key:
        description: RESEND_API_KEY (optional)
        required: false
        default: ""

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Set every Pages env var explicitly
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEMINI: ${{ inputs.gemini_key }}
          ADMIN_USER: ${{ inputs.admin_user }}
          ADMIN_PASSWORD: ${{ inputs.admin_password }}
          RESEND: ${{ inputs.resend_key }}
        run: |
          set -euo pipefail
          PROJ=studio-vella-web
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PROJ}"
          curl -fsS -H "Authorization: Bearer ${CF_TOKEN}" "${API}" -o /tmp/proj.json

          jq --arg gem "$GEMINI" --arg au "$ADMIN_USER" --arg ap "$ADMIN_PASSWORD" --arg res "$RESEND" '
            .result.deployment_configs as $cfg |
            {
              deployment_configs: (
                $cfg
                | .production.env_vars.GEMINI_API_KEY = {"type":"secret_text","value":$gem}
                | .production.env_vars.ADMIN_USER = {"type":"secret_text","value":$au}
                | .production.env_vars.ADMIN_PASSWORD = {"type":"secret_text","value":$ap}
                | (if $res != "" then .production.env_vars.RESEND_API_KEY = {"type":"secret_text","value":$res} else . end)
                | .preview.env_vars.GEMINI_API_KEY = {"type":"secret_text","value":$gem}
                | .preview.env_vars.ADMIN_USER = {"type":"secret_text","value":$au}
                | .preview.env_vars.ADMIN_PASSWORD = {"type":"secret_text","value":$ap}
                | (if $res != "" then .preview.env_vars.RESEND_API_KEY = {"type":"secret_text","value":$res} else . end)
              )
            }
          ' /tmp/proj.json > /tmp/patch.json

          curl -fsS -X PATCH -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            "${API}" --data @/tmp/patch.json -o /tmp/resp.json
          echo "PATCH success: $(jq '.success' /tmp/resp.json)"
