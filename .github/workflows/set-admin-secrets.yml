name: set-admin-secrets

on:
  workflow_dispatch:
    inputs:
      admin_user:
        description: "ADMIN_USER value"
        required: true
        default: "seb"
      admin_password:
        description: "ADMIN_PASSWORD value"
        required: true

permissions:
  contents: read
  deployments: write

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Pages env vars + redeploy
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_USER: ${{ inputs.admin_user }}
          ADMIN_PASSWORD: ${{ inputs.admin_password }}
        run: |
          set -euo pipefail
          PROJ=studio-vella-web
          API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PROJ}"

          curl -fsS -H "Authorization: Bearer ${CF_TOKEN}" "${API}" -o /tmp/proj.json
          jq '.result.deployment_configs' /tmp/proj.json > /tmp/cfg.json
          echo "Existing production env_vars keys:"
          jq '.production.env_vars | keys' /tmp/cfg.json || true

          jq --arg u "$ADMIN_USER" --arg p "$ADMIN_PASSWORD" '
            .production.env_vars = ((.production.env_vars // {}) + {
              "ADMIN_USER":     {"type":"secret_text","value":$u},
              "ADMIN_PASSWORD": {"type":"secret_text","value":$p}
            })
            | .preview.env_vars = ((.preview.env_vars // {}) + {
              "ADMIN_USER":     {"type":"secret_text","value":$u},
              "ADMIN_PASSWORD": {"type":"secret_text","value":$p}
            })
          ' /tmp/cfg.json > /tmp/cfg2.json

          jq -n --slurpfile c /tmp/cfg2.json '{deployment_configs: $c[0]}' > /tmp/patch.json
          curl -fsS -X PATCH -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" \
            "${API}" --data @/tmp/patch.json -o /tmp/patch-resp.json
          echo "PATCH ok: $(jq '.success' /tmp/patch-resp.json)"

          curl -fsS -X POST -H "Authorization: Bearer ${CF_TOKEN}" \
            "${API}/deployments?branch=main" -o /tmp/deploy.json || true
          echo "Deployment requested: $(jq '.result.id // .errors' /tmp/deploy.json)"
