<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="warm" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#f6f2ea" stop-opacity="1"/>
      <stop offset="1" stop-color="#e8dec6" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#warm)"/>
  <!-- table edge -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#8a644a" stroke-width="0.8" opacity="0.5"/>
  
    <!-- Limestone soap dish + linen towel -->
    <ellipse cx="400" cy="500" rx="200" ry="40" fill="#d8cfba" opacity="0.95"/>
    <ellipse cx="400" cy="490" rx="200" ry="40" fill="#e6dec6"/>
    <ellipse cx="400" cy="490" rx="180" ry="28" fill="#c8bda3" opacity="0.4"/>
    <!-- soap -->
    <rect x="340" y="460" width="120" height="36" fill="#f0ead8" rx="4"/>
    <!-- folded linen towel -->
    <g transform="translate(700,400)">
      <rect x="0" y="0" width="280" height="120" fill="#d4c8a8" rx="4"/>
      <rect x="0" y="40" width="280" height="3" fill="#9a8260" opacity="0.5"/>
      <rect x="0" y="80" width="280" height="3" fill="#9a8260" opacity="0.5"/>
    </g>
  <!-- copper underline rule -->
  <line x1="100" y1="740" x2="320" y2="740" stroke="#8a644a" stroke-width="2"/>
  <!-- monogram MH -->
  <text x="100" y="180" font-family="Georgia, serif" font-style="italic" font-size="36" fill="#1f1812" opacity="0.85">M·H</text>
  <text x="100" y="210" font-family="Inter, sans-serif" font-size="11" fill="#1f1812" opacity="0.6" letter-spacing="3">BATH</text>
</svg>