<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="warm" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#f3ede0" stop-opacity="1"/>
      <stop offset="1" stop-color="#e8dec6" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#warm)"/>
  <!-- table edge -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#9a8260" stroke-width="0.8" opacity="0.5"/>
  
    <!-- linen folds -->
    <path d="M 80 200 Q 600 185 1120 200" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 260 Q 600 245 1120 260" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 320 Q 600 305 1120 320" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 380 Q 600 365 1120 380" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 440 Q 600 425 1120 440" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 500 Q 600 485 1120 500" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 560 Q 600 545 1120 560" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 80 620 Q 600 605 1120 620" stroke="#9a8260" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- folded sheet stack -->
    <g transform="translate(380,380)">
      <rect x="0" y="0" width="440" height="20" fill="#d4c8a8"/>
      <rect x="10" y="20" width="420" height="20" fill="#c4b794"/>
      <rect x="20" y="40" width="400" height="20" fill="#b8a87f"/>
      <rect x="30" y="60" width="380" height="20" fill="#a89870"/>
    </g>
  <!-- copper underline rule -->
  <line x1="100" y1="740" x2="320" y2="740" stroke="#9a8260" stroke-width="2"/>
  <!-- monogram MH -->
  <text x="100" y="180" font-family="Georgia, serif" font-style="italic" font-size="36" fill="#2a2218" opacity="0.85">M·H</text>
  <text x="100" y="210" font-family="Inter, sans-serif" font-size="11" fill="#2a2218" opacity="0.6" letter-spacing="3">LINEN</text>
</svg>